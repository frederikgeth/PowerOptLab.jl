name: CI
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 0 * * 3'   # weekly, Wednesday 00:00 UTC
# allow julia-actions/cache to delete old caches it created
permissions:
  actions: write
  contents: read
jobs:
  test:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['lts', '1']   # 'lts' = declared compat floor; '1' = latest stable
        os: [ubuntu-latest]
        arch: [default]
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      # BMOPFTools is not registered yet — develop it from its Git repo so the
      # project resolves before buildpkg/runtest run.
      - name: Develop unregistered BMOPFTools dependency
        run: julia --project=. -e 'using Pkg; Pkg.develop(url="https://github.com/frederikgeth/BMOPFTools.jl")'
      - uses: julia-actions/julia-buildpkg@latest
      - uses: julia-actions/julia-runtest@latest
