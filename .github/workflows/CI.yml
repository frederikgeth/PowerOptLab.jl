name: CI
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    - cron: '0 0 * * 3'   # weekly, Wednesday 00:00 UTC
# allow julia-actions/cache to delete old caches it created
permissions:
  actions: write
  contents: read
jobs:
  test:
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version: ['1.10', '1']   # declared compat floor and latest stable
        os: [ubuntu-latest, macos-latest]
        arch: [default]
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: julia-actions/cache@v3
      # BMOPFTools is not registered yet. Pin the tested source rather than
      # resolving whichever commit happens to be at the head of main.
      - name: Add pinned BMOPFTools dependency
        run: julia --project=. -e 'using Pkg; Pkg.add(PackageSpec(url="https://github.com/frederikgeth/BMOPFTools.jl", rev="c8df8f353637a46a70f60fa95c2d2184e7475d39"))'
      - uses: julia-actions/julia-buildpkg@latest
      - uses: julia-actions/julia-runtest@latest
