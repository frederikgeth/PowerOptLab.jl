name: Documentation

on:
  push:
    branches:
      - main
    tags: '*'
  pull_request:

jobs:
  build:
    permissions:
      contents: write
      statuses: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
      # Develop the pinned unregistered BMOPFTools dep and this package into the
      # docs environment atomically (single resolve), then instantiate.
      - name: Install dependencies
        run: |
          julia --project=docs/ -e '
            using Pkg
            Pkg.develop([
              PackageSpec(url="https://github.com/frederikgeth/BMOPFTools.jl", rev="c8df8f353637a46a70f60fa95c2d2184e7475d39"),
              PackageSpec(path=pwd()),
            ])
            Pkg.instantiate()'
      - name: Build and deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
        run: julia --color=yes --project=docs/ docs/make.jl
